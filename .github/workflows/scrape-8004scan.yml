name: Scrape 8004scan Agent Stats

on:
  schedule:
    # Jalankan setiap hari jam 08:00 WIB (00:00 UTC)
    - cron: '0 0 * * *'
  # Bisa juga di-run manual dari tab Actions
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Run scrape script
        run: python scrape_8004scan.py
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATS.md stats.json
          git diff --staged --quiet || git commit -m "Update agent stats $(date '+%Y-%m-%d')"
          git push
