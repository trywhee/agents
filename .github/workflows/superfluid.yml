name: Update Superfluid Data

on:
  schedule:
    - cron: '0 */6 * * *'   # Setiap 6 jam (jam 0,6,12,18)
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Test connection to subgraph
        run: python test_connection.py
      
      - name: Run fetch script
        run: python scrape_8004scan.py
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add superfluid-data.json
          git diff --staged --quiet || git commit -m "🤖 Auto-update Superfluid data"
          git push
