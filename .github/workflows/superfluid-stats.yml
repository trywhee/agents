name: Update Superfluid Streaming Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # Setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streaming:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run Superfluid stats script
        run: python superfluid-stats.py
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-update Superfluid streaming stats"
          file_pattern: "STREAMING_STATS.md streaming-stats.json"
