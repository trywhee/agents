<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - trywhee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #4ade80; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: #4ade8020; color: #4ade80; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .subtitle { color: #888; margin-bottom: 8px; }
        .last-update { font-size: 12px; color: #666; margin-bottom: 20px; }
        .refresh-btn {
            background: #4ade80;
            color: #0a0a0a;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 24px;
        }
        .agent-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #333;
        }
        .agent-name { font-size: 1.3rem; font-weight: bold; color: #4ade80; margin-bottom: 4px; }
        .agent-id { font-size: 0.7rem; color: #888; font-family: monospace; }
        .agent-wallet { font-size: 0.65rem; color: #666; margin-bottom: 16px; font-family: monospace; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }
        .stat-card {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 1.6rem; font-weight: bold; color: #4ade80; }
        .stat-label { font-size: 0.7rem; color: #888; }
        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 12px;
        }
        .score-high { background: #4ade8020; color: #4ade80; border: 1px solid #4ade80; }
        .score-mid { background: #ffaa4420; color: #ffaa44; border: 1px solid #ffaa44; }
        .score-zero { background: #ff444420; color: #ff4444; border: 1px solid #ff4444; }
        .stream-section {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #333;
        }
        .balance-text {
            font-size: 1rem;
            color: #4ade80;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 12px;
        }
        .pool-list {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 8px;
        }
        .pool-header, .pool-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            padding: 10px 12px;
            font-size: 0.7rem;
            border-bottom: 1px solid #222;
        }
        .pool-header {
            background: #0f0f0f;
            color: #4ade80;
            font-weight: bold;
            border-bottom: 1px solid #4ade80;
        }
        .pool-row {
            color: #ccc;
        }
        .pool-row:last-child { border-bottom: none; }
        .pool-address { font-family: monospace; color: #4ade80; }
        .pool-flow { color: #ffaa44; text-align: right; }
        .superfluid-link {
            display: block;
            margin-top: 16px;
            background: #2a2a2a;
            padding: 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #4ade80;
            text-decoration: none;
            text-align: center;
        }
        .superfluid-link:hover { background: #4ade80; color: #0a0a0a; }
        .loading-text, .error-text { text-align: center; padding: 20px; color: #888; }
        .error-text { color: #ff4444; }
        .note {
            margin-top: 32px;
            padding: 16px;
            background: #1a1a1a;
            border-radius: 12px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Agent Dashboard <span class="badge" id="agentCount">6 Agents</span></h1>
        <p class="subtitle">💰 SUP Balance & Pool Distributions (Auto-update via GitHub Actions)</p>
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
        <div class="last-update" id="lastUpdate">Loading...</div>
        <div class="agent-grid" id="agentGrid">Loading...</div>
        <div class="note">💧 Data diperbarui otomatis setiap 6 jam<br>🔗 Klik "View on Superfluid" untuk detail resmi</div>
    </div>
    <script>
        const AGENTS = [
            { id: 22524, name: "Quantiva Intelligence", wallet: "0xb9868eb3bb740d4d61c0dc1feb4bed6fb58f76e7", score: "72.37", avgScore: "4.7", feedback: "14", rank: "#234" },
            { id: 22497, name: "Nexora Analytics AI", wallet: "0xB9868eB3Bb740d4d61c0Dc1fEb4Bed6FB58f76E7", score: "68.50", avgScore: "4.5", feedback: "8", rank: "#312" },
            { id: 22455, name: "DataQuant Pro", wallet: "0xC222Ce890859E07D8b31a3ccb8C186ebA9914948", score: "65.20", avgScore: "4.3", feedback: "6", rank: "#401" },
            { id: 22300, name: "DataAnalyst Pro", wallet: "0xe16b3f9617aae564c7314bb555c052ce6524fd3f", score: "45.38", avgScore: "4.4", feedback: "2", rank: "#832" },
            { id: 22398, name: "InsightForge AI", wallet: "0x32D9b8E82aa07F77bcBB648Ccf534ED41A782b32", score: "58.90", avgScore: "4.2", feedback: "5", rank: "#445" },
            { id: 30502, name: "StoryWeaver AI", wallet: "0x65f20d80f2817cb4524bfc0f3bc37173da6b1058", score: "0", avgScore: "0", feedback: "0", rank: "#4940" }
        ];

        function formatFlowRate(flowRate) {
            // Jika flowRate sudah dalam format "+X/mo" atau "N/A"
            if (!flowRate || flowRate === "N/A") return "N/A";
            if (typeof flowRate === 'string' && flowRate.includes('/mo')) return flowRate;
            if (typeof flowRate === 'string' && flowRate.includes('+')) return flowRate;
            // Jika masih angka, format manual
            if (typeof flowRate === 'number' || !isNaN(parseFloat(flowRate))) {
                const num = parseFloat(flowRate);
                if (num > 1000) return `+${(num/1000).toFixed(1)}k/mo`;
                if (num > 0) return `+${num.toFixed(1)}/mo`;
            }
            return "Active";
        }

        async function loadData() {
            const grid = document.getElementById('agentGrid');
            grid.innerHTML = '<div class="loading-text">🔄 Mengambil data dari superfluid-data.json...</div>';
            try {
                const response = await fetch('superfluid-data.json?v=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderDashboard(data);
                const updateTime = data.timestamp ? new Date(data.timestamp).toLocaleString() : 'unknown';
                document.getElementById('lastUpdate').innerHTML = `✅ Last update: ${updateTime}`;
            } catch (error) {
                console.error('Error:', error);
                grid.innerHTML = `<div class="error-text">⚠️ Gagal mengambil data: ${error.message}</div>`;
            }
        }

        function renderDashboard(sfData) {
            const grid = document.getElementById('agentGrid');
            document.getElementById('agentCount').innerHTML = `${AGENTS.length} Agents`;
            const agentsData = sfData.agents || {};
            
            grid.innerHTML = AGENTS.map(agent => {
                const shortWallet = agent.wallet.substring(0, 10) + '...' + agent.wallet.substring(38);
                const superfluidUrl = `https://app.superfluid.org/token/base/0xa69f80524381275a7ffdb3ae01c54150644c8792?view=${agent.wallet}`;
                let scoreClass = 'score-zero';
                if (parseFloat(agent.score) >= 60) scoreClass = 'score-high';
                else if (parseFloat(agent.score) > 0) scoreClass = 'score-mid';
                
                const sup = agentsData[agent.name] || {};
                const balance = sup.balance || '0';
                const pools = sup.pools || [];
                
                let poolsHtml = '';
                if (pools.length > 0) {
                    poolsHtml = `
                        <div style="margin-top:12px;">
                            <div style="font-size:0.7rem; color:#4ade80; margin-bottom:8px;">📡 Stream Distributions (${pools.length} pool):</div>
                            <div class="pool-list">
                                <div class="pool-header">
                                    <span>Pool Address</span>
                                    <span>Flow Rate</span>
                                </div>
                                ${pools.map(p => {
                                    // Ambil flowRate dari berbagai kemungkinan field
                                    let flow = p.flowRate || p.flow || p.flow_rate || "N/A";
                                    // Jika flow masih "N/A" tapi ada units, hitung estimasi
                                    if ((flow === "N/A" || flow === "Active") && p.units && p.totalUnits) {
                                        const pct = (p.units / p.totalUnits * 100).toFixed(1);
                                        flow = `${pct}% of pool`;
                                    }
                                    return `
                                    <div class="pool-row">
                                        <span class="pool-address">${p.poolAddress || p.fullAddress?.substring(0,10)+'...' || 'Unknown'}</span>
                                        <span class="pool-flow">${formatFlowRate(flow)}</span>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    `;
                } else {
                    poolsHtml = `<div style="margin-top:12px; font-size:0.7rem; color:#888; text-align:center; padding:12px;">⏸ Belum ada pool distribution</div>`;
                }
                
                return `
                    <div class="agent-card">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-id">Agent ID: ${agent.id} | Base Chain</div>
                        <div class="agent-wallet">💰 Wallet: ${shortWallet}</div>
                        <div class="stats">
                            <div class="stat-card"><div class="stat-value">${agent.score}</div><div class="stat-label">Overall Score</div></div>
                            <div class="stat-card"><div class="stat-value">${agent.avgScore}</div><div class="stat-label">Avg Score</div></div>
                            <div class="stat-card"><div class="stat-value">${agent.feedback}</div><div class="stat-label">Feedback</div></div>
                            <div class="stat-card"><div class="stat-value">${agent.rank}</div><div class="stat-label">Rank</div></div>
                        </div>
                        <div class="score-badge ${scoreClass}">${parseFloat(agent.score) > 0 ? '✅ Terdaftar di 8004scan' : '🆕 Agent Baru'}</div>
                        <div class="stream-section">
                            <div class="balance-text">💧 SUP Balance: ${balance} SUP</div>
                            ${poolsHtml}
                        </div>
                        <a href="${superfluidUrl}" target="_blank" class="superfluid-link">💧 View Detail on Superfluid</a>
                    </div>
                `;
            }).join('');
        }
        
        loadData();
    </script>
</body>
</html>
